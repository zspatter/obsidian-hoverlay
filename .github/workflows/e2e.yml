name: E2E

on:
  push:
    branches: ["main"]
  pull_request:
  # weekly run against freshly resolved Obsidian versions, so a new Obsidian
  # release breaking the plugin surfaces between our own commits
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# a superseded run is cancelled by the next push to the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: e2e (${{ matrix.os }})
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:e2e

      # the config prints the resolved Obsidian versions under CI; use them
      # as the cache key so new releases refresh the cache automatically
      - name: Get Obsidian cache key
        run: |
          npx tsx e2e/wdio.conf.mts | grep 'obsidian-cache-key:' > obsidian-versions-lock.txt
          rm -rf .obsidian-cache
        env:
          CI: "true"

      - name: Cache Obsidian downloads
        uses: actions/cache@v6
        with:
          path: .obsidian-cache
          key: obsidian-cache-${{ matrix.os }}-${{ hashFiles('obsidian-versions-lock.txt') }}

      # linux runners need a virtual display and a window manager for Obsidian
      - if: ${{ matrix.os == 'ubuntu-latest' }}
        name: Set up virtual graphics
        run: |
          sudo apt-get update -q
          sudo apt-get install -q herbstluftwm x11-xserver-utils
          export DISPLAY=:99
          echo "DISPLAY=$DISPLAY" >> "$GITHUB_ENV"
          Xvfb $DISPLAY -screen 0 1280x1024x24 +extension GLX -noreset &
          sleep 1
          herbstluftwm &
          sleep 1

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          WDIO_MAX_INSTANCES: "2" # runners are 2-core

  # scheduled workflows are auto-disabled after 60 days without repository
  # activity; re-enabling resets that clock (same pattern as ci.yml)
  keepalive:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Reset the 60-day scheduled-workflow timer
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable e2e.yml --repo "$GITHUB_REPOSITORY"
