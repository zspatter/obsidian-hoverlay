name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # weekly regression run: unit/component tiers now, and once the e2e tier
  # lands it will pull the latest Obsidian, catching upstream breakage
  # between our own commits
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# a superseded run is cancelled by the next push to the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck and build
        run: npm run build
      - name: Unit and component tests
        run: npm test

  # Scheduled workflows are auto-disabled after 60 days without repository
  # activity, and scheduled runs themselves don't count as activity, so the
  # weekly run would silently die two months into any quiet stretch, which
  # is exactly when it matters most. Re-enabling an already-enabled workflow
  # resets that clock, so each cron run keeps itself alive. (Community
  # established behavior of the enable endpoint, not documented; if GitHub
  # ever changes it, the symptom reverts to "cron went quiet".) Dispatch
  # runs it too so the step stays testable by hand; push/PR runs skip it.
  keepalive:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Reset the 60-day scheduled-workflow timer
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable ci.yml --repo "$GITHUB_REPOSITORY"
